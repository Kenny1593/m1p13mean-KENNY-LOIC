<div class="d-flex" style="min-height: 100vh;">
<app-navbar></app-navbar>
<div class="container">
  <div class="card shadow p-4">
    <h3 class="mb-4">Ajout Utilisateur Boutique</h3>
      <form #userForm="ngForm">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Nom</label>
            <input 
              type="text" 
              class="form-control"
              [(ngModel)]="nom"
              name="nom"
              required>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Email</label>
            <input 
              type="email" 
              class="form-control"
              [(ngModel)]="email"
              name="email"
              required>
          </div>   
                <div class="col-md-6 mb-3">
                    <label class="form-label">Téléphone</label>
                    <input 
                    type="tel" 
                    class="form-control"
                    [(ngModel)]="telephone"
                    name="telephone"
                    required>
                </div>
        </div>

        <div class="text-end">
          <button 
            class="btn btn-primary w-100"
            type="submit"
            (click)="onsubmit()">
            Ajouter
          </button>
        </div>

      </form>
    </div>
  </div>
<div class="flex-fill p-4 bg-light">
      <router-outlet></router-outlet>
</div>
</div>
<app-footer></app-footer>
