<header class="navbar navbar-expand-lg navbar-dark bg-dark px-4 shadow-sm">
  <a class="navbar-brand fw-bold" routerLink="/shop">
    🛍️ MonShop
  </a>

  <div class="ms-auto d-flex align-items-center gap-3">
    <a routerLink="/shop" class="nav-link text-white">Boutique</a>
    <a routerLink="/user" class="nav-link text-white">Mon compte</a>

    <!-- Icône panier avec badge -->
    <a routerLink="/cart" class="nav-link text-white position-relative">
      <i class="bi bi-cart3 fs-5"></i>
      <span
        *ngIf="(cartCount$ | async) as count"
        class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
        style="font-size: 0.65rem;">
        {{ count > 99 ? '99+' : count }}
      </span>
    </a>
  </div>
</header>
