<div class="d-flex" style="min-height: 100vh;">
<app-navbar></app-navbar>
<div class="container">
  <div class="card shadow p-4">
    <h3 class="mb-4">Ajout Boutique</h3>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <!-- Nom -->
      <div class="mb-3">
        <label class="form-label">Nom</label>
        <input 
          type="text" 
          class="form-control"
          formControlName="nom"
          required>
      </div>

      <!-- Description -->
      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea 
          class="form-control"
          formControlName="description"
          rows="3"
          required>
        </textarea>
      </div>

      <div class="mb-3">
        <label>Catégories</label>
        <select class="form-select" formControlName="categories" multiple>
        <option *ngFor="let cat of categories" [ngValue]="cat._id">{{ cat.nom }}</option>
        </select>
    </div>

      <!-- Image -->
      <div class="mb-3">
        <label class="form-label">Logo</label>
        <input 
          type="file" 
          class="form-control"
          formControlName="image"
          (change)="onFileSelected($event)"
          accept="image/*"
          required>
      </div>

      <!-- Preview -->
      <div *ngIf="imagePreview" class="mt-3 text-center">
        <img [src]="imagePreview" class="img-fluid rounded" style="max-height:200px;">
      </div>

      <div class="col-mb-3">
        <label class="form-label">Email</label>
            <input 
              type="email" 
              class="form-control"
              formControlName="email"
              required>
    </div>

      <div class="col-mb-3">
        <label class="form-label">Téléphone</label>
        <input 
             type="tel" 
            class="form-control"
            formControlName="telephone"
            required>
    </div>



      <button type="submit" class="btn btn-primary w-100">
        Enregistrer
      </button>

    </form>
  </div>
</div>

  <!-- Zone dynamique -->
    <div class="flex-fill p-4 bg-light">
      <router-outlet></router-outlet>
    </div>
    </div>
<app-footer></app-footer>
