<div class="d-flex" style="min-height: 100vh;">
<app-navbar></app-navbar>
<div class="container">
  <div class="card shadow p-4">
    <h3 class="mb-4">Ajout Catégorie</h3>

    <form (ngSubmit)="onSubmit()">

      <!-- Nom -->
      <div class="mb-3">
        <label class="form-label">Nom</label>
        <input 
          type="text" 
          class="form-control"
          [(ngModel)]="categorie.nom"
          name="nom"
          required>
      </div>

      <!-- Description -->
      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea 
          class="form-control"
          [(ngModel)]="categorie.description"
          name="description"
          rows="3"
          required>
        </textarea>
      </div>

      <!-- Image -->
      <div class="mb-3">
        <label class="form-label">Image (URL)</label>
        <input 
          type="file" 
          class="form-control"
          [(ngModel)]="categorie.image"
          name="image"
          (change)="onFileSelected($event)"
          accept="image/*"
          required>
      </div>
      <!-- Preview -->
      <div *ngIf="imagePreview" class="mt-3 text-center">
        <img [src]="imagePreview" class="img-fluid rounded" style="max-height:200px;">
      </div>



      <button type="submit" class="btn btn-primary w-100">
        Enregistrer
      </button>

    </form>
  </div>
</div>

  <!-- Zone dynamique -->
    <div class="flex-fill p-4 bg-light">
      <router-outlet></router-outlet>
    </div>
    </div>
<app-footer></app-footer>
