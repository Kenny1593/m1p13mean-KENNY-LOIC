<div class="container mt-5">

  <!-- Titre -->
  <div class="row mb-4">
    <div class="col text-center">
      <h2 class="fw-bold">Gestion des utilisateurs</h2>
    </div>
  </div>

  <!-- Formulaire -->
  <div class="card shadow-sm mb-4">
    <div class="card-header bg-primary text-white">
      Ajouter un utilisateur
    </div>

    <div class="card-body">
      <form #userForm="ngForm">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Nom</label>
            <input 
              type="text" 
              class="form-control"
              [(ngModel)]="nom"
              name="nom"
              required>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Email</label>
            <input 
              type="email" 
              class="form-control"
              [(ngModel)]="email"
              name="email"
              required>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Mot de passe</label>
            <input 
              type="password" 
              class="form-control"
              [(ngModel)]="motDePasse"
              name="motDePasse"
              required>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Confirmer mot de passe</label>
              <input 
                type="password" 
                class="form-control"
                [(ngModel)]="confirmMotDePasse"
                name="confirmMotDePasse"
                required>
                <div class="text-danger" *ngIf="confirmMotDePasse && motDePasse !== confirmMotDePasse">
                  Les mots de passe ne correspondent pas
                </div>
            </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Téléphone</label>
                    <input 
                    type="tel" 
                    class="form-control"
                    [(ngModel)]="telephone"
                    name="telephone"
                    required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Rue</label>
                    <input 
                    type="text" 
                    class="form-control"
                    [(ngModel)]="adresse.rue"
                    name="rue"
                    required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Ville</label>
                    <input 
                    type="text" 
                    class="form-control"
                    [(ngModel)]="adresse.ville"
                    name="ville"
                    required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Code postal</label>
                    <input 
                    type="text" 
                    class="form-control"
                    [(ngModel)]="adresse.codePostal"
                    name="codePostal"
                    required>
                </div>

        </div>

        <div class="text-end">
          <button 
            class="btn btn-success"
            type="submit"
            (click)="onSubmit()">
            Ajouter
          </button>
        </div>

      </form>
    </div>
  </div>
  <!-- Zone dynamique -->
    <div class="flex-fill p-4 bg-light">
      <router-outlet></router-outlet>
    </div>
    </div>
<app-footer></app-footer>
