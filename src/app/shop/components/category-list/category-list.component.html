<div *ngIf="loading" class="text-center py-4">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Chargement...</span>
  </div>
</div>

<div class="list-group" *ngIf="!loading && categories.length > 0">
  <a 
    *ngFor="let category of categories" 
    class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
    [class.active]="selectedCategory === category.id"
    [class.text-muted]="category.produitCount === 0 && category.id !== 'all'"
    [class.disabled]="category.produitCount === 0 && category.id !== 'all'"
    (click)="selectCategory(category.id)"
  >
    <span>
      <i *ngIf="category.id === 'all'" class="bi bi-grid-3x3-gap me-2"></i>
      <i *ngIf="category.id !== 'all'" class="bi bi-collection me-2"></i>
      {{ category.nom }}
    </span>
    <span class="badge bg-secondary rounded-pill ms-2">
      {{ getProductsCountText(category.produitCount) }}
    </span>
  </a>
</div>

<div *ngIf="!loading && categories.length === 0" class="alert alert-warning small">
  <i class="bi bi-exclamation-triangle me-1"></i>
  Aucune catégorie disponible
</div>
