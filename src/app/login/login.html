<div class="container">
  <div class="row justify-content-center align-items-center vh-100">
    <div class="col-md-4">
      <div class="card shadow">
        <div class="card-body">
          <h3 class="text-center mb-4">Connexion</h3>

          <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input
                type="email"
                class="form-control"
                [(ngModel)]="email"
                name="email"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label">Mot de passe</label>
              <input
                type="password"
                class="form-control"
                [(ngModel)]="motDePasse"
                name="password"
                required
              />
            </div>

            <button type="submit" class="btn btn-primary w-100">
              Se connecter
            </button>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>

<footer class="bg-dark text-white mt-5 p-4 d-flex flex-column align-items-center">
  <div class="text-center">
    <p class="mb-1">ETU1593 - RAKOTOARITAHINA Labarre Tokiniaina Kenny</p>

  </div>
</footer>
