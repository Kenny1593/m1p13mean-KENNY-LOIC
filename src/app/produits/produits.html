<div class="d-flex" style="min-height: 100vh;">
<app-navbar></app-navbar>
<div class="container">
  <div class="card shadow p-4">
    <h3 class="mb-4">Ajout Produit</h3>

    <form [formGroup]="produitForm" (ngSubmit)="onSubmit()">

      <!-- Nom -->
      <div class="mb-3">
        <label class="form-label">Nom</label>
        <input 
          type="text" 
          class="form-control"
          formControlName="nom"
          required>
      </div>

      <!-- Description -->
      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea 
          class="form-control"
          formControlName="description"
          rows="3"
          required>
        </textarea>
      </div>

      <!-- Marque -->
      <div class="mb-3">
        <label class="form-label">Marque</label>
        <input 
          type="text" 
          class="form-control"
          formControlName="marque"
          required>
      </div>

      <!-- Reference -->
      <div class="mb-3">
        <label class="form-label">Reference</label>
        <input 
          type="text" 
          class="form-control"
          formControlName="reference"
          required>
      </div>


      <div class="mb-3">
        <label class="form-label">Logo</label>
        <input type="file" class="form-control" formControlName="image"
               (change)="onFileSelected($event)" accept="image/*" required>
      </div>

      <!-- Preview -->
      <div *ngIf="imagePreview" class="mt-3 text-center">
        <img [src]="imagePreview" class="img-fluid rounded" style="max-height:200px;">
      </div>

      <div class="mb-3">
        <label>Catégories</label>
        <select class="form-select" formControlName="categories" multiple>
        <option *ngFor="let cat of categories" [ngValue]="cat._id">{{ cat.nom }}</option>
        </select>
    </div>


      <div class="col-mb-3">
        <label class="form-label">Prix</label>
            <input 
              type="number" 
              class="form-control"
              formControlName="prix"
              required>
    </div>

      <div class="col-mb-3">
        <label class="form-label">Quantité</label>
        <input 
             type="number" 
            class="form-control"
            formControlName="quantite"
            required>
    </div>

    <div class="col-mb-3">
      <button type="submit" class="btn btn-primary w-100">
        Enregistrer
      </button>
    </div>

    </form>
  </div>
</div>

  <!-- Zone dynamique -->
    <div class="flex-fill p-4 bg-light">
      <router-outlet></router-outlet>
    </div>
    </div>
    
<app-footer></app-footer>
